# CD 파이프라인: main 브랜치에 push 되면 자동 실행
name: CD Pipeline

on:
  push:
    branches: [ main ]    # main에 merge 될 때만 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 소스코드 가져오기
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # Docker Hub 로그인 (Secrets 사용)
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker 이미지 빌드
      - name: Docker 이미지 빌드
        run: docker build -t capstone2026-backend:latest ./backend

      # 이미지에 태그 붙이기 (버전: git commit 해시 사용)
      - name: 이미지 태그 설정
        run: |
          docker tag capstone2026-backend:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:${{ github.sha }}
          docker tag capstone2026-backend:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:latest
          docker tag capstone2026-frontend:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:${{ github.sha }}
          docker tag capstone2026-frontend:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:latest

      # Docker Hub에 Push
      - name: Docker Hub Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:latest
